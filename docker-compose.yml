version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: arthaa_db
    environment:
      POSTGRES_USER: ${DB_USER:-arthaa_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-arthaa_pass}
      POSTGRES_DB: ${DB_NAME:-arthaa}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-arthaa_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - arthaa_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arthaa_backend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-arthaa_user}:${DB_PASSWORD:-arthaa_pass}@db:5432/${DB_NAME:-arthaa}
      SECRET_KEY: ${SECRET_KEY:-change-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-deepseek-r1:7b}
      UPLOAD_DIR: /app/uploads
      APP_ENV: ${APP_ENV:-production}
      CORS_ORIGINS: '["http://localhost:80","http://localhost:3000"]'
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - arthaa_network
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: arthaa_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - arthaa_network

  ollama:
    image: ollama/ollama:latest
    container_name: arthaa_ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    networks:
      - arthaa_network

volumes:
  postgres_data:
  uploads_data:
  ollama_data:

networks:
  arthaa_network:
    driver: bridge
